<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">    
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkdein</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <a href="index.html" class="logo"><img src="images/logo.png" alt="Linkdein logo"></a>

           <div class="search-box">
            <img src="images/search.png" alt="Search icon">
            <input type="text" placeholder="Search">
           </div>

        </div>
        <div class="navbar-center">
            <ul>
                <li><a href="#" class="active-link"><img src="images/home.png" alt="Home"><span>Home</span></a></li>
                <li><a href="#"><img src="images/network.png" alt="My Network"><span>My Network</span></a></li>
                <li><a href="#"><img src="images/jobs.png" alt="Jobs"><span>Jobs</span></a></li>
                <li><a href="#"><img src="images/message.png" alt="Messaging"><span>Messaging</span></a></li>
                <li><a href="#"><img src="images/notification.png" alt="Notifications"><span>Notifications</span></a></li>
            
            </ul>
        </div>
        <div class="navbar-right">
            <div class="online">
                <img src="images/user-1.png" class="nav-profile-img" onclick="toggleMenu()">
            </div>
            
        </div>
     <!--------------profile-drop-down-menu-------------->
         <div class="profile-menu-wrap" id="profilemenu">
            <div class="profile-menu">
             <div class="user-info">
                <img src="images/user-1.png" class="nav-profile-img">
                <div>
                    <h3>Samir sapkota</h3>
                    <a href="#">See your profile</a>
                </div>
            </div>
            <hr>
            <a href="#" class="profile-menu-link">
                <img src="images/feedback.png">
                <p>Give feedback</p>
                <span>></span>
            </a>
            <a href="#" class="profile-menu-link">
                <img src="images/setting.png">
                <p>Help & support</p>
                <span>></span>
            </a>
            <a href="#" class="profile-menu-link">
                <img src="images/display.png">
                <p>Display & Accessibility </p>
                <span>></span>
            </a>
            <a href="#" class="profile-menu-link">
                <img src="images/logout.png">
                <p>Logout</p>
                <span>></span>
            </a>

            </div>
         </div>
    </nav>
    

   <script>
     let profilemenu= document.getElementById("profilemenu")

      function toggleMenu(){
        profilemenu.classList.toggle("open-menu");
      }
   </script> 
</body>
</html>
